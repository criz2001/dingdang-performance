version: '3.8'

services:
  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./web/dist:/usr/share/nginx/html/web
    depends_on:
      - app
    restart: always

  app:
    image: dingdang-performance:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=dingdang
      - DB_USER=root
      - DB_PASS=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASS=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - WECOM_CORP_ID=${WECOM_CORP_ID}
      - WECOM_CORP_SECRET=${WECOM_CORP_SECRET}
      - WECOM_AGENT_ID=${WECOM_AGENT_ID}
    depends_on:
      - mysql
      - redis
    restart: always

  mysql:
    image: mysql:8.0.36
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=dingdang
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/seeds/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: always

volumes:
  mysql_data:
  redis_data: