name: Deploy to Railway

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      railway_token:
        description: 'Railway Token'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Railway
        run: |
          npm install -g @railway/cli
          railway login --token-source --stdin <<< "${{ inputs.railway_token || env.RAILWAY_TOKEN }}"

      - name: Deploy to Railway
        run: |
          railway deploy --token "${{ inputs.railway_token || env.RAILWAY_TOKEN }}"
        env:
          RAILWAY_TOKEN: ${{ inputs.railway_token || env.RAILWAY_TOKEN }}