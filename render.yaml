# ============================================================
# 叮当绩效管理系统 - Render.com 部署配置
# ============================================================
# 
# 部署步骤：
# 1. 将代码推送到 GitHub（已完成）
# 2. 打开 https://dashboard.render.com/connect
# 3. 连接 GitHub 仓库：criz2001/dingdang-performance
# 4. 创建 PostgreSQL 数据库（用于数据持久化）
# 5. 创建 Web Service（后端）
# 6. 创建 Static Site（前端）
#
# ============================================================

# 后端 API 服务
api:
  type: web
  name: dingdang-performance-api
  env: node
  region: singapore
  plan: free
  buildCommand: cd server && npm install && npm run build
  startCommand: cd server && npm run start:prod
  healthCheckPath: /api/auth/login
  envVars:
    - key: NODE_ENV
      value: production
    - key: APP_PREFIX
      value: /api
    - key: JWT_SECRET
      generateValue: true
    - key: JWT_EXPIRES_IN
      value: 12h
    # PostgreSQL 数据库连接（创建 Render PostgreSQL 后自动填入）
    - key: DATABASE_URL
      fromDatabase:
        name: dingdang-performance-db
        property: connectionString

# 前端静态服务
web:
  type: web
  name: dingdang-performance-web
  env: static
  region: singapore
  plan: free
  buildCommand: cd web && npm install && npm run build
  staticPublishPath: web/dist
  routes:
    - type: rewrite
      source: /*
      destination: /index.html
  headers:
    - for: /*
      name: X-Frame-Options
      value: SAMEORIGIN
    - for: /*
      name: X-Content-Type-Options
      value: nosniff
    - for: /*
      name: Content-Security-Policy
      value: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://dingdang-performance-api.onrender.com
  envVars:
    - key: VITE_API_BASE_URL
      value: https://dingdang-performance-api.onrender.com/api